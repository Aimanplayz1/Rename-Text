<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Renamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .copy-btn:active {
            transform: scale(0.95);
        }
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
        @media (max-width: 768px) {
            .mobile-stack {
                flex-direction: column;
            }
            .mobile-w-full {
                width: 100%;
            }
            .mobile-text-sm {
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body class="min-h-screen gradient-bg">
    <div class="container mx-auto px-3 md:px-4 py-4 md:py-8">
        <!-- Header -->
        <div class="text-center mb-6 md:mb-8">
            <h1 class="text-3xl md:text-5xl font-bold text-white mb-2 drop-shadow-lg">Text Renamer</h1>
            <p class="text-white/80 text-sm md:text-lg">Transform your text with powerful find and replace</p>
        </div>

        <!-- Main Content -->
        <div class="glass rounded-2xl md:rounded-3xl shadow-2xl p-4 md:p-8 max-w-7xl mx-auto">
            <!-- Text Areas -->
            <div class="grid md:grid-cols-2 gap-4 md:gap-6 mb-6 md:mb-8">
                <!-- Input -->
                <div class="space-y-2 md:space-y-3">
                    <div class="flex items-center justify-between min-h-[2.5rem]">
                        <label class="text-gray-700 font-semibold text-base md:text-lg">Input Text</label>
                        <button onclick="clearInput()" class="btn-gradient text-white px-3 md:px-4 py-2 rounded-lg font-medium text-xs md:text-sm">Clear</button>
                    </div>
                    <textarea 
                        id="inputText" 
                        class="w-full h-40 md:h-64 p-3 md:p-4 border-2 border-gray-200 rounded-xl focus:border-purple-500 input-glow resize-none transition-all duration-200 text-gray-700 text-sm md:text-base"
                        placeholder="Paste your text here..."
                        oninput="updateOutput()"
                    ></textarea>
                    <div class="text-xs md:text-sm text-gray-500" id="inputStats">0 characters</div>
                </div>

                <!-- Output -->
                <div class="space-y-2 md:space-y-3">
                    <div class="flex items-center justify-between min-h-[2.5rem]">
                        <label class="text-gray-700 font-semibold text-base md:text-lg">Output Text</label>
                        <button 
                            onclick="copyOutput()" 
                            class="copy-btn btn-gradient text-white px-3 md:px-4 py-2 rounded-lg font-medium flex items-center gap-2 text-sm md:text-base"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 md:h-5 w-4 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                            </svg>
                            Copy
                        </button>
                    </div>
                    <textarea 
                        id="outputText" 
                        class="w-full h-40 md:h-64 p-3 md:p-4 border-2 border-gray-200 rounded-xl bg-gray-50 resize-none text-gray-700 text-sm md:text-base"
                        placeholder="Your transformed text will appear here..."
                        readonly
                    ></textarea>
                    <div class="text-xs md:text-sm text-gray-500" id="outputStats">0 characters</div>
                </div>
            </div>

            <!-- Replacement Rules -->
            <div class="space-y-3 md:space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg md:text-xl font-semibold text-gray-700">Replacement Rules</h2>
                    <button 
                        onclick="addRule()" 
                        class="btn-gradient text-white px-3 md:px-4 py-2 rounded-lg font-medium flex items-center gap-2 text-sm md:text-base"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 md:h-5 w-4 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Add Rule
                    </button>
                </div>

                <div id="rulesContainer" class="space-y-3">
                    <!-- Rules will be added here dynamically -->
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="mt-6 md:mt-8 flex flex-wrap gap-2 md:gap-3">
                <button onclick="addRule()" class="px-3 md:px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 font-medium transition text-sm md:text-base">
                    + Add Another Rule
                </button>
                <button onclick="clearAllRules()" class="px-3 md:px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 font-medium transition text-sm md:text-base">
                    Clear All Rules
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-white/60 text-sm">
            Made with love • Real-time text transformation
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 md:bottom-8 right-4 md:right-8 left-4 md:left-auto bg-green-500 text-white px-4 md:px-6 py-2 md:py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 text-center md:text-left">
        Copied to clipboard!
    </div>

    <script>
        let ruleCount = 0;

        function addRule() {
            ruleCount++;
            const container = document.getElementById('rulesContainer');
            const ruleDiv = document.createElement('div');
            ruleDiv.className = 'fade-in flex flex-col md:flex-row gap-3 items-start md:items-center';
            ruleDiv.id = `rule-${ruleCount}`;
            ruleDiv.innerHTML = `
                <div class="flex-1 w-full">
                    <input 
                        type="text" 
                        placeholder="Find..." 
                        class="w-full px-3 md:px-4 py-2 md:py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 input-glow transition-all text-sm md:text-base"
                        oninput="updateOutput()"
                    >
                </div>
                <div class="text-gray-400 font-bold self-center md:self-auto">→</div>
                <div class="flex-1 w-full">
                    <input 
                        type="text" 
                        placeholder="Replace with..." 
                        class="w-full px-3 md:px-4 py-2 md:py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 input-glow transition-all text-sm md:text-base"
                        oninput="updateOutput()"
                    >
                </div>
                <button 
                    onclick="removeRule(${ruleCount})"
                    class="p-2 md:p-3 text-red-500 hover:bg-red-50 rounded-lg transition self-end md:self-auto"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 md:h-6 w-5 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            `;
            container.appendChild(ruleDiv);
        }

        function removeRule(id) {
            const rule = document.getElementById(`rule-${id}`);
            if (rule) {
                rule.remove();
                updateOutput();
            }
        }

        function clearAllRules() {
            document.getElementById('rulesContainer').innerHTML = '';
            ruleCount = 0;
            updateOutput();
        }

        function clearInput() {
            document.getElementById('inputText').value = '';
            updateOutput();
        }

        function getRules() {
            const rules = [];
            const container = document.getElementById('rulesContainer');
            const ruleDivs = container.children;
            
            for (let div of ruleDivs) {
                const inputs = div.querySelectorAll('input');
                if (inputs.length === 2) {
                    const find = inputs[0].value;
                    const replace = inputs[1].value;
                    if (find) {
                        rules.push({ find, replace });
                    }
                }
            }
            
            return rules;
        }

        function updateOutput() {
            const inputText = document.getElementById('inputText').value;
            const rules = getRules();
            
            let outputText = inputText;
            for (let rule of rules) {
                outputText = outputText.split(rule.find).join(rule.replace);
            }
            
            document.getElementById('outputText').value = outputText;
            
            // Update stats
            document.getElementById('inputStats').textContent = `${inputText.length} characters`;
            document.getElementById('outputStats').textContent = `${outputText.length} characters`;
        }

        function copyOutput() {
            const outputText = document.getElementById('outputText');
            outputText.select();
            document.execCommand('copy');
            
            // Show toast
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2000);
        }

        // Add initial rule
        addRule();
    </script>
</body>
</html>
